<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 1rem;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            background: white;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
        }
        
        h1 {
            font-size: 36px;
            font-weight: 700;
            color: #333;
            text-align: center;
        }
        
        .stats-container {
            display: flex;
            gap: 2rem;
            justify-content: center;
            width: 100%;
            flex-wrap: wrap;
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-label {
            font-size: 14px;
            color: #999;
            font-weight: 500;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #667eea;
        }
        
        #gameCanvas {
            border: 3px solid #667eea;
            border-radius: 12px;
            background: #1a1a2e;
            display: block;
            width: 100%;
            max-width: 400px;
            height: auto;
            aspect-ratio: 1;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        
        .controls {
            width: 100%;
            text-align: center;
        }
        
        .instructions {
            color: #666;
            font-size: 14px;
            margin-bottom: 1rem;
            line-height: 1.6;
        }
        
        .buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        button {
            padding: 12px 28px;
            font-size: 15px;
            font-weight: 600;
            border: 2px solid #667eea;
            background: #667eea;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        button:hover {
            background: white;
            color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .secondary {
            background: white;
            color: #667eea;
        }
        
        .secondary:hover {
            background: #667eea;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Snake Game</h1>
        
        <div class="stats-container">
            <div class="stat">
                <div class="stat-label">Score</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Best</div>
                <div class="stat-value" id="best">0</div>
            </div>
        </div>
        
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        
        <div class="controls">
            <div class="instructions">
                <p>Use arrow keys or WASD to move</p>
                <p id="gameStatus">Press START to begin</p>
            </div>
            <div class="buttons">
                <button onclick="startGame()">Start Game</button>
                <button class="secondary" onclick="resetGame()">New Game</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        
        let snake = [{ x: 10, y: 10 }];
        let food = { x: 15, y: 15 };
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let bestScore = localStorage.getItem('snakeBestScore') || 0;
        let gameActive = false;
        let gameRunning = false;
        
        function drawGrid() {
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }
        }
        
        function drawSnake() {
            snake.forEach((segment, index) => {
                const gradient = ctx.createLinearGradient(
                    segment.x * gridSize,
                    segment.y * gridSize,
                    segment.x * gridSize + gridSize,
                    segment.y * gridSize + gridSize
                );
                
                if (index === 0) {
                    gradient.addColorStop(0, '#4ECDC4');
                    gradient.addColorStop(1, '#1ABC9C');
                } else {
                    gradient.addColorStop(0, '#45B7D1');
                    gradient.addColorStop(1, '#3498DB');
                }
                
                ctx.fillStyle = gradient;
                ctx.fillRect(
                    segment.x * gridSize + 1,
                    segment.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2
                );
                
                if (index === 0) {
                    ctx.strokeStyle = '#1ABC9C';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(
                        segment.x * gridSize + 1,
                        segment.y * gridSize + 1,
                        gridSize - 2,
                        gridSize - 2
                    );
                }
            });
        }
        
        function drawFood() {
            const x = food.x * gridSize;
            const y = food.y * gridSize;
            
            ctx.fillStyle = '#FF6B6B';
            ctx.beginPath();
            ctx.arc(x + gridSize / 2, y + gridSize / 2, gridSize / 2 - 2, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.strokeStyle = '#FF5252';
            ctx.lineWidth = 2;
            ctx.stroke();
        }
        
        function update() {
            if (!gameActive) return;
            
            direction = nextDirection;
            const head = snake[0];
            const newHead = {
                x: (head.x + direction.x + tileCount) % tileCount,
                y: (head.y + direction.y + tileCount) % tileCount
            };
            
            for (let segment of snake) {
                if (newHead.x === segment.x && newHead.y === segment.y) {
                    endGame();
                    return;
                }
            }
            
            snake.unshift(newHead);
            
            if (newHead.x === food.x && newHead.y === food.y) {
                score += 10;
                updateScore();
                generateFood();
            } else {
                snake.pop();
            }
        }
        
        function generateFood() {
            let newFood;
            let foodOnSnake = true;
            while (foodOnSnake) {
                newFood = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
                foodOnSnake = snake.some(segment => segment.x === newFood.x && segment.y === newFood.y);
            }
            food = newFood;
        }
        
        function draw() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            drawGrid();
            drawSnake();
            drawFood();
        }
        
        function gameLoop() {
            update();
            draw();
        }
        
        function updateScore() {
            document.getElementById('score').textContent = score;
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('snakeBestScore', bestScore);
                document.getElementById('best').textContent = bestScore;
            }
        }
        
        function startGame() {
            if (!gameRunning) {
                gameActive = true;
                gameRunning = true;
                document.getElementById('gameStatus').textContent = 'Game is running...';
            }
        }
        
        function endGame() {
            gameActive = false;
            gameRunning = false;
            document.getElementById('gameStatus').textContent = `Game Over! Final Score: ${score}`;
        }
        
        function resetGame() {
            snake = [{ x: 10, y: 10 }];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            gameActive = false;
            gameRunning = false;
            updateScore();
            generateFood();
            document.getElementById('gameStatus').textContent = 'Press START to begin';
        }
        
        document.addEventListener('keydown', (e) => {
            if (!gameRunning) {
                if (e.key === 'Enter' || e.key === ' ') {
                    startGame();
                }
            }
            
            switch(e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    if (direction.y === 0) nextDirection = { x: 0, y: -1 };
                    e.preventDefault();
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    if (direction.y === 0) nextDirection = { x: 0, y: 1 };
                    e.preventDefault();
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    if (direction.x === 0) nextDirection = { x: -1, y: 0 };
                    e.preventDefault();
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    if (direction.x === 0) nextDirection = { x: 1, y: 0 };
                    e.preventDefault();
                    break;
            }
        });
        
        document.getElementById('best').textContent = bestScore;
        generateFood();
        
        setInterval(gameLoop, 100);
        draw();
    </script>
</body>
</html>
